{% extends "base.html" %}

{% block title %}Daftar Akun | SkripsiEngineer{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card glass">
        <div class="auth-header">
            <h2>Daftar Akun Baru</h2>
            <p>Bergabung dengan ratusan calon engineer sukses lainnya</p>
        </div>
        
        <form action="{{ url_for('register') }}" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Masukkan username" required>
            </div>
            
            <div class="form-group">
                <label for="email">Alamat Email</label>
                <input type="email" id="email" name="email" placeholder="name@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="•••••••• (Min. 6 karakter)" minlength="6" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Nomor WhatsApp</label>
                <input type="tel" id="phone" name="phone" placeholder="Contoh: 081234567890" required>
            </div>
            
            <div class="form-group">
                <label for="major">Jurusan / Program Studi</label>
                <select id="major" name="major" required>
                    <option value="" disabled selected>Pilih jurusan kamu</option>
                    <option value="Teknik Elektro">Teknik Elektro</option>
                    <option value="Teknik Informatika / Ilmu Komputer">Teknik Informatika / Ilmu Komputer</option>
                    <option value="Sistem Informasi">Sistem Informasi</option>
                    <option value="Teknik Fisika / MATLAB">Teknik Fisika / MATLAB</option>
                    <option value="Teknik Telekomunikasi">Teknik Telekomunikasi</option>
                    <option value="Teknik Robotika & Mekatronika">Teknik Robotika & Mekatronika</option>
                    <option value="Lainnya">Lainnya</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Daftar Akun</button>
        </form>
        
        <div class="auth-footer">
            <p>Sudah memiliki akun? <a href="{{ url_for('login') }}">Masuk disini</a></p>
        </div>
    </div>
</div>
{% endblock %}
